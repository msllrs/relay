name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git rev-list --count

      - name: Build DMG
        run: ./make-dmg.sh

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Relay v${{ steps.version.outputs.version }}
          files: .build/Relay-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
